events {
    worker_connections 1024;
}

http {

    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:8080;
    }

    upstream ai_service {
        server ai-service:8001;
    }

    server {
        listen 80;
        #frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        #backend
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        #AI-serrvice
        location /ai/ {
            proxy_pass http://ai_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

    }
}
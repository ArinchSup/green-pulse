services:
  chromadb:
    image: chromadb/chroma:latest
    expose:
      - "8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped
  ollama:
    build:
      context: ./src
      dockerfile: ollamaDockerfile
    expose:
      - "11434"
    volumes:
      - ollama-models:/root/.ollama
      - ollama-adapters:/app/model_adapter
    restart: unless-stopped
  ai-service:
    build:
      context: ./src
      dockerfile: aiDockerfile
    expose: 
      - "8001"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped
  
  backend:
    build:
      context: ./src/controller
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - SUPABASEPASS=${SUPADBPASS}
      - DATABASE=${DATABASE}
      - SUPADBHOST=${SUPADBHOST}
      - SUPADBPORT=${SUPADBPORT}
      - ClientID=${CLIENTID}
      - ClientSecret=${CLIENTSECRET}
    depends_on:
      - ai-service
    restart: unless-stopped
  frontend:
    build:
      context: ./src/web-ui
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - ai-service
    restart: unless-stopped
  
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/snap/docker/common/var-lib-docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
  node-exporter:
    image: prom/node-exporter:latest
    expose:
      - "9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - cadvisor
      - node-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  chroma-data:
  ollama-models:
  ollama-adapters:
  prometheus-data:
  grafana-data:
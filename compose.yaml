services:
  chromadb:
    image: chromadb/chroma:latest
    expose:
      - "8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped
  ollama:
    build:
      context: ./src
      dockerfile: ollamaDockerfile
    expose:
      - "11434"
    volumes:
      - ollama-models:/root/.ollama
      - ollama-adapters:/app/model_adapter
    restart: unless-stopped
  ai-service:
    build:
      context: ./src
      dockerfile: aiDockerfile
    expose: 
      - "8001"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped
  
  backend:
    build:
      context: ./src/controller
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - SUPABASEPASS=${SUPADBPASS}
      - DATABASE=${DATABASE}
      - SUPADBHOST=${SUPADBHOST}
      - SUPADBPORT=${SUPADBPORT}
      - ClientID=${CLIENTID}
      - ClientSecret=${CLIENTSECRET}
    depends_on:
      - ai-service
    restart: unless-stopped
  frontend:
    build:
      context: ./src/web-ui
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - ai-service
    restart: unless-stopped
volumes:
  chroma-data:
  ollama-models:
  ollama-adapters: